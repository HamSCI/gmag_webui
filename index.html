<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Magnetometer Dash</title>
        <link rel="apple-touch-icon" sizes="180x180" href="images/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">
        <link rel="manifest" href="/site.webmanifest">
        <!--Third-Party Libraries-->
        <link href="vendor/fontawesome-free-7.1.0-web/css/fontawesome.css" rel="stylesheet" />
        <link href="vendor/fontawesome-free-7.1.0-web/css/brands.css" rel="stylesheet" />
        <link href="vendor/fontawesome-free-7.1.0-web/css/solid.css" rel="stylesheet" />
        <script src="vendor/plotly-3.3.0.min.js"></script>
        <script src="vendor/mqtt.min.js"></script>
        <!-- Set the theme before first paint to avoid a light/dark flash. Reads
             the saved preference ("system" | "light" | "dark"); js/index.js is
             the source of truth thereafter. -->
        <script>
            (function () {
                var theme = "system";
                try {
                    var s = JSON.parse(localStorage.getItem("settings"));
                    if (s && s.theme) theme = s.theme;
                } catch (e) { /* ignore malformed settings */ }
                var dark = theme === "dark" || (theme === "system" &&
                    window.matchMedia("(prefers-color-scheme: dark)").matches);
                document.documentElement.dataset.theme = dark ? "dark" : "light";
            })();
        </script>
        <!--Local Stylesheets-->
        <link href="css/index.css" rel="stylesheet" />
    </head>
    <body>
        <header>
            <div>
                <i id="sideToggle" class="fa-solid fa-bars"></i>
                <img src="images/HamSci.png" height="25" />
                <div id="wordmark">Magnetometer Dash</div>
                <!-- Tabbed interface for multiple data sources (issue #21).
                     Tabs are rendered into #tabs by js/index.js. -->
                <div id="tabber">
                    <div id="tabs"></div>
                    <button type="button" id="addTab" title="Add source">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <div id="status" class="error">
                    <i class="fa-solid fa-circle-xmark"></i>
                    <span>Disconnected</span>
                </div>
            </div>
        </header>
        <div class="layout">
            <aside id="config">
                <!-- Connection (issue #20): pick a source and connect to it -->
                <section class="panel" data-collapsed="false">
                    <button type="button" class="panel-header">
                        <i class="fa-solid fa-plug"></i>
                        <span class="title">Connection</span>
                        <i class="chevron fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="panel-body">
                        <label class="field">
                            <span class="field-label">Source name</span>
                            <input type="text" id="srcName" placeholder="Untitled" />
                        </label>
                        <div class="field">
                            <span class="field-label">Source type</span>
                            <div id="connType" class="select-group">
                                <button type="button" name="websocket" disabled>WebSocket</button>
                                <button type="button" name="mqtt">MQTT</button>
                                <button type="button" name="file">File</button>
                            </div>
                        </div>
                        <!-- WebSocket -->
                        <div class="type-fields" data-type="websocket">
                            <label class="field">
                                <span class="field-label">WebSocket URL</span>
                                <input type="url" id="wsUrl" class="mono" placeholder="ws://host:port" />
                                <span class="field-error" id="wsUrlErr"></span>
                            </label>
                        </div>
                        <!-- MQTT (fields only for now; ingestion lands with issue #19) -->
                        <div class="type-fields" data-type="mqtt" hidden>
                            <label class="field">
                                <span class="field-label">Broker URL</span>
                                <input type="url" id="mqttBroker" class="mono" placeholder="wss://broker:port" />
                                <span class="field-error" id="mqttBrokerErr"></span>
                            </label>
                            <label class="field">
                                <span class="field-label">Topic</span>
                                <input type="text" id="mqttTopic" class="mono" placeholder="magnetometer/data" />
                                <span class="field-error" id="mqttTopicErr"></span>
                            </label>
                            <label class="field">
                                <span class="field-label">Username <span class="muted">(optional)</span></span>
                                <input type="text" id="mqttUser" class="mono" />
                            </label>
                            <label class="field">
                                <span class="field-label">Password <span class="muted">(optional)</span></span>
                                <input type="password" id="mqttPass" class="mono" />
                            </label>
                        </div>
                        <!-- File -->
                        <div class="type-fields" data-type="file" hidden>
                            <label class="field">
                                <span class="field-label">Log file</span>
                                <input type="file" id="logfile" accept=".log" />
                                <span class="field-error" id="fileErr"></span>
                            </label>
                        </div>
                        <button type="button" id="connectBtn" class="btn-primary">
                            <i class="fa-solid fa-plug"></i>
                            Connect
                        </button>
                    </div>
                </section>

                <!-- Processing -->
                <section class="panel" data-collapsed="false">
                    <button type="button" class="panel-header">
                        <i class="fa-solid fa-sliders"></i>
                        <span class="title">Processing</span>
                        <i class="chevron fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="panel-body">
                        <div class="subhead">
                            <i class="fa-solid fa-up-down-left-right"></i>
                            <span>Rotation</span>
                        </div>
                        <div class="slider-group">
                            <label for="rotX">X</label>
                            <input type="range" id="rotX" value="0" min="-270" max="270" step="90" />
                            <span id="xDelta">0</span>
                        </div>
                        <div class="slider-group">
                            <label for="rotY">Y</label>
                            <input type="range" id="rotY" value="0" min="-270" max="270" step="90" />
                            <span id="yDelta">0</span>
                        </div>
                        <div class="slider-group">
                            <label for="rotZ">Z</label>
                            <input type="range" id="rotZ" value="0" min="-270" max="270" step="90" />
                            <span id="zDelta">0</span>
                        </div>
                        <button type="button" id="saveRot" class="btn-secondary">
                            <i class="fa-solid fa-floppy-disk"></i>
                            Save Rotation
                        </button>
                        <div class="subhead">
                            <i id="delta" class="fa-regular fa-play"></i>
                            <span>delta-B</span>
                        </div>
                        <div class="field">
                            <span class="field-label">Calculation Method</span>
                            <div id="dBType" class="select-group">
                                <button type="button" name="constant" disabled>Constant dB</button>
                                <button type="button" name="moving">Moving Average</button>
                            </div>
                        </div>
                        <div class="method-fields" data-type="constant">
                            <label class="field">
                                <span class="field-label">&Delta;H</span>
                                <input type="number" id="dH" class="mono" placeholder="0.000" step="0.001" />
                            </label>
                            <label class="field">
                                <span class="field-label">&Delta;E</span>
                                <input type="number" id="dE" class="mono" placeholder="0.000" step="0.001" />
                            </label>
                            <label class="field">
                                <span class="field-label">&Delta;Z</span>
                                <input type="number" id="dZ" class="mono" placeholder="0.000" step="0.001" />
                            </label>
                        </div>
                        <div class="method-fields" data-type="moving" hidden></div>
                        <div class="flex-row">
                            <button type="button" id="savedB" class="btn-secondary">
                                <i class="fa-solid fa-floppy-disk"></i>
                                Save dB
                            </button>
                            <button type="button" id="resetdB" class="btn-secondary">
                                <i class="fa-solid fa-arrow-rotate-left"></i>
                                Reset
                            </button>
                        </div>
                    </div>
                </section>

                <!-- Display -->
                <section class="panel" data-collapsed="false">
                    <button type="button" class="panel-header">
                        <i class="fa-solid fa-chart-line"></i>
                        <span class="title">Display</span>
                        <i class="chevron fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="panel-body">
                        <label class="field">
                            <span class="field-label">Time window</span>
                            <select id="timerange">
                                <option value="1m">1 Minute</option>
                                <option value="5m">5 Minutes</option>
                                <option value="15m">15 Minutes</option>
                                <option value="1h" selected>1 Hour</option>
                                <!-- <option value="4h">4 Hours</option> -->
                            </select>
                        </label>
                        <label class="field">
                            <span class="field-label">Show dB/dt</span>
                            <div class="toggle-switch lg square">
                                <input type="checkbox" name="dBdtToggle" id="dBdtToggle" />
                                <span class="slider"></span>
                            </div>
                        </label>
                        <div class="subhead">
                            <i class="fa-solid fa-wave-square"></i>
                            <span>Moving average</span>
                        </div>
                        <div id="filterGroup" class="select-group">
                            <button type="button" name="off" disabled>Off</button>
                            <button type="button" name="on">On</button>
                        </div>
                        <label class="field">
                            <span class="field-label">Window</span>
                            <select id="filterWindow">
                                <option value="10">10 seconds</option>
                                <option value="30">30 seconds</option>
                                <option value="60" selected>60 seconds</option>
                            </select>
                        </label>
                    </div>
                </section>
            </aside>
            <main>
                <div id="plots"></div>
            </main>
            <div class="right-column">
                <div id="current-wrapper" class="content-box">
                    <div class="header">
                        <i class="fa-solid fa-gauge-high"></i>
                        <span>Current Reading</span>
                    </div>
                    <div id="current">
                        <div class="row1">
                            <div class="cell">
                                <div class="cell-head">H (nT)</div>
                                <div id="h" class="cell-value">-</div>
                            </div>
                            <div class="cell">
                                <div class="cell-head">E (nT)</div>
                                <div id="e" class="cell-value">-</div>
                            </div>
                            <div class="cell">
                                <div class="cell-head">Z (nT)</div>
                                <div id="z" class="cell-value">-</div>
                            </div>
                        </div>
                        <div class="row2">
                            <div class="cell">
                                <div class="cell-head">Magnitude (nT)</div>
                                <div id="mag" class="cell-value">-</div>
                            </div>
                            <div class="cell">
                                <div class="cell-head">Temperature (&deg;C)</div>
                                <div id="temp" class="cell-value">-</div>
                            </div>
                            <div class="cell" style="display:none">
                                <div class="cell-head">dB/dt (nT/s)</div>
                                <div id="dBdt" class="cell-value">-</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="trends" class="content-box">
                    <div class="header">
                        <i class="fa-solid fa-arrow-trend-up"></i>
                        <span>30-Minute Trends</span>
                    </div>
                    <div id="sparklines"></div>
                </div>
                <div id="data" class="content-box">
                    <div class="header">
                        <i class="fa-solid fa-table"></i>
                        <span>Spreadsheet</span>
                        <div class="flex-row">
                            <button id="jsonl" class="btn-primary sm" title="Export JSONL">
                                <i class="fa-solid fa-file-code"></i>
                                <span class="btn-label">Export JSONL</span>
                            </button>
                            <button id="csv" class="btn-primary sm" title="Export CSV">
                                <i class="fa-solid fa-file-csv"></i>
                                <span class="btn-label">Export CSV</span>
                            </button>
                        </div>
                    </div>
                    <!--Table containing H, E, Z, Temp, magnitude, etc.-->
                    <div id="spreadsheet">
                        <table class="fixed-table">
                            <thead class="fixed-head">
                                <tr>
                                    <th>Date</th>
                                    <th style="color:#f00">H</th>
                                    <th style="color:#32cd32">E</th>
                                    <th style="color:#00a6ff">Z</th>
                                    <th style="color:#f0f">Mag</th>
                                    <th style="color:#ff0">Temp</th>
                                    <th class="col-dbdt" style="color:#9af8ff">dB/dt</th>
                                </tr>
                            </thead>
                            <tbody class="scrolling">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <footer>
            <div>
                <a href="https://hamsci.org" target="_blank" title="HamSCI website">HamSCI</a> &copy; 2026
                <a href="https://github.com/HamSCI/gmag_webui/tree/main" target="_blank" title="GitHub">
                    <i class="fa-brands fa-github"></i>
                </a>
            </div>
            <!-- Light Mode/Dark Mode Toggle -->
            <div id="ldWrapper">
                <i class="fa-solid fa-circle-half-stroke"></i>
                <label class="toggle-switch square" title="Toggle Light/Dark Mode">
                    <input type="checkbox" name="ldMode" id="ldMode" />
                    <span class="slider"></span>
                </label>
            </div>
        </footer>
        <script type="text/javascript" src="js/transit.js"></script>
        <script type="module" src="js/index.js"></script>
    </body>
</html>
