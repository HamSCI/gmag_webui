<!DOCTYPE html>
<html>
    <head>
        <title>Magnetometer Dash</title>
        <!--Third-Party Libraries-->
        <link href="vendor/fontawesome-free-7.1.0-web/css/fontawesome.css" rel="stylesheet" />
        <link href="vendor/fontawesome-free-7.1.0-web/css/brands.css" rel="stylesheet" />
        <link href="vendor/fontawesome-free-7.1.0-web/css/solid.css" rel="stylesheet" />
        <script src="vendor/plotly-3.3.0.min.js"></script>
        <script src="vendor/mqtt.min.js"></script>
        <!--Local Stylesheets-->
        <link href="css/index.css" rel="stylesheet" />
    </head>
    <body>
        <header>
            <div>
                <i id="sideToggle" class="fa-solid fa-bars"></i>
                <img src="images/HamSci.png" height="30" />
                <div id="wordmark" style="font-style: italic;">Magnetometer Dash</div>
                <!--Tabbed interface for multiple magnetometers-->
                <!-- <div id="tabber">
                    <div id="tabs">
                        <template id="srcTab">
                            <div class="tab">
                                <div class="tab-ico">
                                    <i class="fa-solid fa-question"></i>
                                </div>
                                <span class="tab-name">
                                    Untitled
                                </span>
                                <div class="tab-closer">
                                    <i class="fa-solid fa-xmark"></i>
                                </div>
                            </div>
                        </template>
                    </div>
                    <div id="addNew" class="new-tab-btn">
                        <i class="fa-solid fa-plus"></i>
                        <span class="tooltip">
                            Add new source
                        </span>
                    </div>
                </div> -->
                <div id="status" class="error">
                    <i class="fa-solid fa-circle-xmark"></i>
                    <span>Disconnected</span>
                </div>
            </div>
        </header>
        <div class="layout">
            <aside id="config">
                <!-- Connection (issue #20): pick a source and connect to it -->
                <section class="panel" data-collapsed="false">
                    <button type="button" class="panel-header">
                        <i class="fa-solid fa-plug"></i>
                        <span class="title">Connection</span>
                        <i class="chevron fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="panel-body">
                        <label class="field">
                            <span class="field-label">Source name</span>
                            <input type="text" id="srcName" placeholder="Untitled" />
                        </label>
                        <div class="field">
                            <span class="field-label">Source type</span>
                            <div id="connType" class="select-group">
                                <button type="button" name="websocket" disabled>WebSocket</button>
                                <button type="button" name="mqtt">MQTT</button>
                                <button type="button" name="file">File</button>
                            </div>
                        </div>
                        <!-- WebSocket -->
                        <div class="type-fields" data-type="websocket">
                            <label class="field">
                                <span class="field-label">WebSocket URL</span>
                                <input type="text" id="wsUrl" class="mono" placeholder="ws://host:port" />
                                <span class="field-error" id="wsUrlErr"></span>
                            </label>
                        </div>
                        <!-- MQTT (fields only for now; ingestion lands with issue #19) -->
                        <div class="type-fields" data-type="mqtt" hidden>
                            <label class="field">
                                <span class="field-label">Broker URL</span>
                                <input type="text" id="mqttBroker" class="mono" placeholder="wss://broker:port" />
                                <span class="field-error" id="mqttBrokerErr"></span>
                            </label>
                            <label class="field">
                                <span class="field-label">Topic</span>
                                <input type="text" id="mqttTopic" class="mono" placeholder="magnetometer/data" />
                                <span class="field-error" id="mqttTopicErr"></span>
                            </label>
                            <label class="field">
                                <span class="field-label">Username <span class="muted">(optional)</span></span>
                                <input type="text" id="mqttUser" class="mono" />
                            </label>
                            <label class="field">
                                <span class="field-label">Password <span class="muted">(optional)</span></span>
                                <input type="password" id="mqttPass" class="mono" />
                            </label>
                        </div>
                        <!-- File -->
                        <div class="type-fields" data-type="file" hidden>
                            <label class="field">
                                <span class="field-label">Log file</span>
                                <input type="file" id="logfile" accept=".log" />
                                <span class="field-error" id="fileErr"></span>
                            </label>
                        </div>
                        <button type="button" id="connectBtn" class="btn-primary">
                            <i class="fa-solid fa-plug"></i>
                            Connect
                        </button>
                    </div>
                </section>

                <!-- Processing -->
                <section class="panel" data-collapsed="false">
                    <button type="button" class="panel-header">
                        <i class="fa-solid fa-sliders"></i>
                        <span class="title">Processing</span>
                        <i class="chevron fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="panel-body">
                        <div class="subhead">
                            <i class="fa-solid fa-up-down-left-right"></i>
                            <span>Rotation</span>
                        </div>
                        <div class="slider-group">
                            <label for="rotX">X</label>
                            <input type="range" id="rotX" value="0" min="-270" max="270" step="90" />
                            <span id="xDelta">0</span>
                        </div>
                        <div class="slider-group">
                            <label for="rotY">Y</label>
                            <input type="range" id="rotY" value="0" min="-270" max="270" step="90" />
                            <span id="yDelta">0</span>
                        </div>
                        <div class="slider-group">
                            <label for="rotZ">Z</label>
                            <input type="range" id="rotZ" value="0" min="-270" max="270" step="90" />
                            <span id="zDelta">0</span>
                        </div>
                        <button type="button" id="saveRot" class="btn-secondary">
                            <i class="fa-solid fa-floppy-disk"></i>
                            Save rotation
                        </button>
                        <div class="subhead">
                            <i class="fa-solid fa-wave-square"></i>
                            <span>Moving average</span>
                        </div>
                        <div id="filterGroup" class="select-group">
                            <button type="button" name="off" disabled>Off</button>
                            <button type="button" name="on">On</button>
                        </div>
                        <label class="field">
                            <span class="field-label">Window</span>
                            <select id="filterWindow">
                                <option value="10">10 seconds</option>
                                <option value="30">30 seconds</option>
                                <option value="60" selected>60 seconds</option>
                            </select>
                        </label>
                    </div>
                </section>

                <!-- Display -->
                <section class="panel" data-collapsed="false">
                    <button type="button" class="panel-header">
                        <i class="fa-solid fa-chart-line"></i>
                        <span class="title">Display</span>
                        <i class="chevron fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="panel-body">
                        <label class="field">
                            <span class="field-label">Time window</span>
                            <select id="timerange">
                                <option value="1m">1 Minute</option>
                                <option value="5m">5 Minutes</option>
                                <option value="15m">15 Minutes</option>
                                <option value="1h" selected>1 Hour</option>
                                <!-- <option value="4h">4 Hours</option> -->
                            </select>
                        </label>
                    </div>
                </section>
            </aside>
            <main>
                <div id="plots"></div>
            </main>
            <div class="right-column">
                <div id="current-wrapper" class="content-box">
                    <div class="header">
                        <i class="fa-solid fa-gauge-high"></i>
                        <span>Current Reading</span>
                    </div>
                    <div id="current">
                        <div class="row1">
                            <div class="cell">
                                <div class="cell-head">H (nT)</div>
                                <div id="h" class="cell-value">-</div>
                            </div>
                            <div class="cell">
                                <div class="cell-head">E (nT)</div>
                                <div id="e" class="cell-value">-</div>
                            </div>
                            <div class="cell">
                                <div class="cell-head">Z (nT)</div>
                                <div id="z" class="cell-value">-</div>
                            </div>
                        </div>
                        <div class="row2">
                            <div class="cell">
                                <div class="cell-head">Magnitude (nT)</div>
                                <div id="mag" class="cell-value">-</div>
                            </div>
                            <div class="cell">
                                <div class="cell-head">Temperature (&deg;C)</div>
                                <div id="temp" class="cell-value">-</div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="data" class="content-box">
                    <div class="header">
                        <i class="fa-solid fa-table"></i>
                        <span>Spreadsheet</span>
                    </div>
                    <!--Table containing H, E, Z, Temp, magnitude, etc.-->
                    <div id="spreadsheet">
                        <table class="fixed-table">
                            <thead class="fixed-head">
                                <tr>
                                    <th>Date</th>
                                    <th style="color:#f00">H</th>
                                    <th style="color:#32cd32">E</th>
                                    <th style="color:#00a6ff">Z</th>
                                    <th style="color:#f0f">Mag</th>
                                    <th style="color:#ff0">Temp</th>
                                </tr>
                            </thead>
                            <tbody class="scrolling">
                            </tbody>
                        </table>
                    </div>
                </div>
                <div id="trends" class="content-box">
                    <div class="header">
                        <i class="fa-solid fa-arrow-trend-up"></i>
                        <span>Trends</span>
                    </div>
                    <div id="sparklines"></div>
                </div>
            </div>
        </div>
        <footer>
            <div>
                HamSCI &copy; 2026
                <a href="https://github.com/HamSCI/gmag_webui/tree/main">
                    <i class="fa-brands fa-github"></i>
                </a>
            </div>
        </footer>
        <script type="text/javascript" src="js/transit.js"></script>
        <script type="module" src="js/index.js"></script>
    </body>
</html>
